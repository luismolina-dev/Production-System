spring.application.name=production

logging.level.root=INFO
logging.level.com.app.talentflow=DEBUG

#DB config
spring.datasource.url=jdbc:postgresql://${DB_URL:localhost}:${DB_PORT:5432}/${DB_NAME:talentflow}
spring.datasource.username=${DB_USER:myuser}
spring.datasource.password=${DB_PASSWORD:mypassword}

#Jpa config
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# SpringDoc config
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.show-actuator=false

#JWT config
application.security.jwtSecret=${SECRET:0Yau+W7+QtIJjGjSWlj/QIDufClz5NMWt1rUJ+qiV9M=}
application.security.jwtExpiration=${EXPIRE:86400000}